name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: true
      next:
        description: 'Next version'
        required: false

env:
  JAVA_DISTRO: 'temurin'

jobs:
  release:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        value: [flink-1.16]

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: ${{ env.JAVA_DISTRO }}
          java-version: |
             11
             21

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2.4.2

      - name: Set Release Version
        id: version
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          FLINK_VERSION=`cd sdk/${{ matrix.value }} && grep "def flinkVersion" build.gradle | sed "s/.*'\([0-9.]*\)'.*/\1/"`
          SDK_VERSION=${{ github.event.inputs.version }}
          RELEASE_VERSION="$FLINK_VERSION-$SDK_VERSION"
          RELEASE_BRANCH="release-$RELEASE_VERSION"
          PLAIN_VERSION=`echo ${RELEASE_VERSION} | awk ' { if (match($0, /^[0-9]+\.[0-9]+\.[0-9]+-([0-9]+\.[0-9]+\.[0-9]+)/)) { split(substr($0, RSTART, RLENGTH), parts, "-"); print parts[2]; } }'`
          NEXT_VERSION=${{ github.event.inputs.next }}
          COMPUTED_NEXT_VERSION="${PLAIN_VERSION}-SNAPSHOT"
          if [ -z $NEXT_VERSION ]
          then
            NEXT_VERSION="$FLINK_VERSION-$COMPUTED_NEXT_VERSION"
          else
            NEXT_VERSION="$FLINK_VERSION-$NEXT_VERSION"
          fi

          git checkout -b $RELEASE_BRANCH
          echo "version=$RELEASE_VERSION" > sdk/${{ matrix.value }}/gradle.properties
          
          ### patch example's dependencies for maven and gradle builds
          sed -i 's/<decodable.pipeline.sdk.version>.*<\/decodable.pipeline.sdk.version>/<decodable.pipeline.sdk.version>'"$RELEASE_VERSION"'<\/decodable.pipeline.sdk.version>/g' examples/custom-pipelines-hello-world/pom.xml
          sed -i 's/sdkVersion = \x27.*\x27/sdkVersion = \x27'"$RELEASE_VERSION"'\x27/g' examples/custom-pipelines-hello-world/build.gradle
          sed -i 's/<flink.version>.*<\/flink.version>/<flink.version>'"$FLINK_VERSION"'<\/flink.version>/g' examples/custom-pipelines-hello-world/pom.xml
          sed -i 's/flinkVersion = \x27.*\x27/flinkVersion = \x27'"$FLINK_VERSION"'\x27/g' examples/custom-pipelines-hello-world/build.gradle

          ### patch README.md
          sed -i 's/^_Version\s.*$/_Version '"$RELEASE_VERSION"'_/g' README.md
          sed -i 's/<version>.*<\/version>/<version>'"$RELEASE_VERSION"'<\/version>/g' README.md
          sed -i 's/implementation \x27co\.decodable:decodable-pipeline-sdk:.*\x27/implementation \x27co.decodable:decodable-pipeline-sdk:'"$RELEASE_VERSION"'\x27/g' README.md

          git config --global user.email "decodable-release-bot@decodable.co.invalid"
          git config --global user.name "decodable-release-bot"
          git commit -a -m "Releasing version $RELEASE_VERSION"
          git push origin $RELEASE_BRANCH

          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          echo "RELEASE_BRANCH=$RELEASE_BRANCH" >> $GITHUB_ENV
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_ENV
          echo "NEXT_VERSION=$NEXT_VERSION" >> $GITHUB_ENV
          echo "PLAIN_VERSION=$PLAIN_VERSION" >> $GITHUB_ENV

      - name: Build SDK
        run: cd sdk/${{ matrix.value }} && ../gradlew build publishToMavenLocal publish
      
      - name: Build Example Project With Maven
        run: cd examples/custom-pipelines-hello-world && ./mvnw -B clean verify
       
      - name: Build Example Project With Gradle
        run: cd examples/custom-pipelines-hello-world && ./gradlew clean build

      - name: Release SDK
        env:
          JRELEASER_NEXUS2_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          JRELEASER_NEXUS2_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.RELEASE_GPG_PASSPHRASE }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.RELEASE_GPG_PUBLIC_KEY }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.RELEASE_GPG_SECRET_KEY }}
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JRELEASER_BRANCH: ${{ env.RELEASE_BRANCH }}
        run: |
          cd sdk/${{ matrix.value }} && ../gradlew jreleaserConfig jreleaserFullRelease

      - name: Prepare API Docs Publication
        run: |
          mkdir -p sdk/build/docs/decodable-pipeline-sdk/api-docs/${{ matrix.value }}
          mv sdk/${{ matrix.value }}/build/docs/javadoc sdk/build/docs/decodable-pipeline-sdk/api-docs/${{ matrix.value }}/current

      - name: Publish API Docs
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./sdk/build/docs/decodable-pipeline-sdk

      - name: JReleaser Output
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: jreleaser-release
          path: |
            sdk/${{ matrix.value }}/build/jreleaser/trace.log
            sdk/${{ matrix.value }}/build/jreleaser/output.properties

      - name: Set Next Version
        run: |
          echo "version=$FLINK_VERSION-$NEXT_VERSION" > sdk/${{ matrix.value }}/gradle.properties
          git config --global user.email "decodable-release-bot@decodable.co.invalid"
          git config --global user.name "decodable-release-bot"
          git commit -a -m "Next version ${{ env.NEXT_VERSION }}"
          git checkout ${{ env.BRANCH }}
          git merge ${{ env.RELEASE_BRANCH }}
          git push origin ${{ env.BRANCH }}
          git push origin :${{ env.RELEASE_BRANCH }}
